<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Pass Predictor</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1rem 1.25rem;
      }

      input {
        width: 100%;
        padding: 0.5rem;
        margin: 0.4rem 0 0.8rem;
      }

      button {
        padding: 0.55rem 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Student Pass Predictor</h1>
    <p>Use this simple UI for your live deployment demo.</p>

    <div class="card">
      <label>Study hours per day</label>
      <input type="number" id="study_hours" step="0.1" value="3.5" />

      <label>Attendance (%)</label>
      <input type="number" id="attendance" step="1" value="82" />

      <label>Assignments completed</label>
      <input type="number" id="assignments_completed" step="1" value="7" />

      <button onclick="predict()">Predict</button>
      <p id="result"></p>
    </div>

    <script>
      async function predict() {
        const payload = {
          study_hours: Number(document.getElementById('study_hours').value),
          attendance: Number(document.getElementById('attendance').value),
          assignments_completed: Number(document.getElementById('assignments_completed').value),
        };

        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        document.getElementById('result').innerText =
          `Prediction: ${data.prediction_label} (probability=${data.pass_probability.toFixed(3)})`;
      }
    </script>
  </body>
</html>
